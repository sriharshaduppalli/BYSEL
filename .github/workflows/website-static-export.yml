name: website-static-export

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/website-static-export.yml"

jobs:
  export-static-site:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Archive export output
        run: |
          tar -czf bysel-website-out.tar.gz -C out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bysel-website-out
          path: website/bysel-website-out.tar.gz
          if-no-files-found: error
