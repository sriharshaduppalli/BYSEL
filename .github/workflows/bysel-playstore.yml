name: BYSEL Play Store Release

on:
  workflow_dispatch:   # manual trigger
    inputs:
      track:
        description: "Play track to publish"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - internal
          - beta
      release_status:
        description: "Release status for selected track"
        required: true
        default: "completed"
        type: choice
        options:
          - completed
          - draft
          - inProgress
      changes_not_sent_for_review:
        description: "Set true to upload without immediately sending for review"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - 'v*.*.*'       # e.g. v1.0.0

jobs:
  build-release:
    runs-on: ubuntu-latest
    outputs:
      signing_available: ${{ steps.signing.outputs.available }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Check signing configuration
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && \
             [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && \
             [ -n "${{ secrets.KEY_ALIAS }}" ] && \
             [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets detected."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets are missing; release build and deploy will be skipped."
          fi

      - name: Decode Keystore
        if: steps.signing.outputs.available == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Gradle build (AAB)
        if: steps.signing.outputs.available == 'true'
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew --no-daemon --info clean bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: BYSEL-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Skip release build (missing signing secrets)
        if: steps.signing.outputs.available != 'true'
        run: |
          echo "Skipping release build because signing secrets are not configured."

  deploy-playstore:
    if: ${{ needs.build-release.outputs.signing_available == 'true' }}
    runs-on: ubuntu-latest
    needs: build-release
    env:
      PLAYSTORE_SERVICE_ACCOUNT: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: BYSEL-release-aab
          path: build/

      - name: Generate Play Store release notes
        run: |
          mkdir -p distribution/whatsnew
          python - <<'PY'
          import datetime as dt
          import os
          import subprocess
          from pathlib import Path

          sha = os.environ.get("GITHUB_SHA", "HEAD")
          ref_name = os.environ.get("GITHUB_REF_NAME", "manual")

          def cmd(args):
              return subprocess.check_output(args, text=True).strip()

          previous_tag = ""
          try:
              previous_tag = cmd(["git", "describe", "--tags", "--abbrev=0", f"{sha}^"])
          except Exception:
              previous_tag = ""

          log_range = f"{previous_tag}..{sha}" if previous_tag else sha

          try:
              subjects_raw = cmd(["git", "log", log_range, "--no-merges", "--pretty=format:%s", "-n", "20"])
              subjects = subjects_raw.splitlines() if subjects_raw else []
          except Exception:
              subjects = []

          ignored_prefixes = (
              "chore(android): bump version",
              "merge ",
              "release ",
          )

          bullets = []
          for subject in subjects:
              subject = subject.strip()
              if not subject:
                  continue
              lowered = subject.lower()
              if any(lowered.startswith(prefix) for prefix in ignored_prefixes):
                  continue
              bullets.append(f"• {subject}")
              if len(bullets) == 6:
                  break

          if not bullets:
              bullets = [
                  "• Bug fixes and performance improvements.",
                  "• Stability and reliability enhancements.",
              ]

          header = f"BYSEL {ref_name} ({dt.datetime.utcnow():%Y-%m-%d})"
          notes = header + "\n" + "\n".join(bullets)

          max_chars = 500
          if len(notes) > max_chars:
              notes = notes[: max_chars - 1].rstrip() + "…"

          output = Path("distribution/whatsnew/whatsnew-en-US")
          output.write_text(notes + "\n", encoding="utf-8")
          print(f"Generated {output} ({len(notes)} chars)")
          PY

      - name: Preview generated release notes
        run: cat distribution/whatsnew/whatsnew-en-US

      - name: Upload to Google Play
        if: ${{ env.PLAYSTORE_SERVICE_ACCOUNT != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT }}
          packageName: com.bysel.trader
          releaseFiles: build/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.release_status || 'completed' }}
          changesNotSentForReview: ${{ github.event.inputs.changes_not_sent_for_review == 'true' }}
          whatsNewDirectory: distribution/whatsnew

      - name: Skip upload if Play credentials are missing
        if: ${{ env.PLAYSTORE_SERVICE_ACCOUNT == '' }}
        run: |
          echo "⚠️ PLAYSTORE_SERVICE_ACCOUNT secret not configured"
          echo "AAB artifact is ready at: build/app-release.aab"
          echo "Add PLAYSTORE_SERVICE_ACCOUNT in repo secrets to enable automatic Play uploads."
