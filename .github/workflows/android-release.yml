name: Android Release (AAB)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - android-build-fixes

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME_17: /usr/lib/jvm/java-17-openjdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode keystore from secrets
        run: |
          echo "Decoding keystore to android/keystore.jks"
          mkdir -p android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=${{ github.workspace }}/android/keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Grant execute for Gradle wrapper
        run: chmod +x android/gradlew || true

      - name: Build release bundle
        run: cd android && ./gradlew :app:bundleRelease --no-daemon --warning-mode all

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
